name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v2

      - run: just build
      - run: python3 artix-dev.pyz dump-config

      - uses: actions/upload-artifact@v4
        with:
          name: artix-dev.pyz
          path: artix-dev.pyz

  release:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: artix-dev.pyz

      - name: Move latest tag to current commit
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Delete existing release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from `${{ github.sha }}`.

            Download and run on the Artix live ISO:
            ```bash
            curl -sLO https://github.com/${{ github.repository }}/releases/download/latest/artix-dev.pyz
            sudo python3 artix-dev.pyz install
            ```
          files: artix-dev.pyz
          prerelease: true
          make_latest: true
