# Artix Linux with full disk encryption on NVMe SSD
# ThinkPad X1 Carbon / similar ultrabook

[disk]
device = "/dev/nvme0n1"
type = "nvme"
esp_size = "512M"
trim = true

[luks]
cipher = "aes-xts-plain64"
key_size = 512
hash = "sha512"
iter_time = 10000
luks_type = "luks1"

[lvm]
boot_size = "1G"
swap_size = "16G"

[grub]
timeout = 15
gfxmode = "auto"

[system]
hostname = "artix"
locale = "en_US.UTF-8"
timezone = "US/Mountain"
username = "user"
kernel = "linux-hardened"
caps_lock_remap = true
tmpfs_size = "8G"
ssh = "disable"
ssh_authorized_keys = [
    # Paste your public key(s) here, one per line:
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINeIyA5BHv4nPttFn10ailg/82PQJ5y7WQDrG8/oV42T test@artix-dev",
]

[sway_home]
repo = "https://github.com/EnigmaCurry/sway-home"
clone_path = "~/git/vendor/enigmacurry/sway-home"

[features]
enable = ["desktop", "flatpak", "nix", "podman", "sway_home"]

[services]
enable = ["acpid", "cronie", "ntpd", "syslog-ng"]

[packages]
extra = [
    "bash-completion", "lsof", "strace", "wget", "htop",
    "zip", "unzip", "p7zip", "unrar",
    "hdparm", "smartmontools", "hwinfo", "dmidecode",
    "rsync", "nmap", "inetutils", "net-tools", "whois",
]

[flatpak]
apps = ["org.fedoraproject.MediaWriter", "io.github.kolunmi.Bazaar"]
